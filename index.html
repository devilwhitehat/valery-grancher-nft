<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valéry Grancher — Studio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        body { background-color: #06060a; color: #ececf6; font-family: 'Helvetica', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        
        /* Design Original */
        .brand { text-align: center; font-size: 26.4px; font-weight: bold; color: #beff09; letter-spacing: 5px; margin-bottom: 0px; text-transform: uppercase; }
        .subtitle { text-align: center; font-size: 13.2px; font-family: 'Helvetica Light'; color: #585775; letter-spacing: 2px; margin-top: 5px; }
        
        /* Section Connexion */
        #lockScreen { text-align: center; display: flex; flex-direction: column; align-items: center; }
        .access-msg { color: #fc3b54; font-family: 'Menlo', monospace; font-size: 11px; font-weight: bold; margin-top: 30px; background-color: #0b0b10; padding: 5px 10px; }
        .wallet-target { color: #beff09; font-family: 'Menlo', monospace; font-size: 10px; margin-bottom: 20px; }
        
        .btn-connect { background-color: #beff09; color: #06060a; border: none; padding: 12px 25px; font-size: 13px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; margin-top: 20px; }
        .btn-connect:hover { opacity: 0.8; }

        /* Interface d'Édition (Harmonisée avec l'original) */
        #adminPanel { display: none; width: 90%; max-width: 450px; background: #100f17; padding: 30px; border: 1px solid #1a1923; }
        .panel-title { font-family: 'Menlo'; font-size: 14px; color: #beff09; border-bottom: 1px solid #585775; padding-bottom: 10px; margin-bottom: 20px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; color: #585775; font-size: 10px; text-transform: uppercase; margin-bottom: 5px; font-family: 'Menlo'; }
        input, textarea, select { width: 100%; background: #06060a; border: 1px solid #585775; color: #ececf6; padding: 10px; font-size: 12px; font-family: 'Helvetica'; box-sizing: border-box; }
        
        .row { display: flex; gap: 10px; }
        .btn-save { background-color: #beff09; color: #06060a; border: none; width: 100%; padding: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="lockScreen">
        <div class="brand">VALÉRY GRANCHER</div>
        <div class="subtitle">STUDIO ARTISTE</div>
        
        <div class="access-msg">Accès exclusif artiste</div>
        <div class="wallet-target">0xA266...6f93</div>
        
        <button class="btn-connect" onclick="connect()">Connecter MetaMask</button>
        <p id="status" style="font-size: 10px; color: #585775; font-family: 'Menlo'; margin-top: 15px;"></p>
    </div>

    <div id="adminPanel">
        <div class="panel-title">CONFIGURATION_OEUVRE</div>
        
        <div class="form-group">
            <label>Titre de l'œuvre</label>
            <input type="text" id="title" placeholder="Saisir le titre...">
        </div>

        <div class="row">
            <div class="form-group" style="flex:2">
                <label>Série / Collection</label>
                <input type="text" id="series" placeholder="Nom de la série">
            </div>
            <div class="form-group" style="flex:1">
                <label>Édition</label>
                <select id="edition"></select>
            </div>
        </div>

        <div class="form-group">
            <label>Prix (ETH)</label>
            <input type="number" step="0.01" id="price" placeholder="0.00">
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea id="desc" rows="3" placeholder="Description de l'œuvre..."></textarea>
        </div>

        <button class="btn-save" onclick="save()">ENREGISTRER LES MODIFICATIONS</button>
    </div>

    <script>
        const AUTH = "0xa26698254830a4bceb381700cfb0b38a4f146f93".toLowerCase();
        
        const sel = document.getElementById('edition');
        for(let i=0; i<=100; i++) {
            let opt = document.createElement('option');
            opt.value = i;
            opt.innerHTML = i === 0 ? "Unique (1/1)" : "Édition " + i;
            sel.appendChild(opt);
        }

        async function connect() {
            if (!window.ethereum) { alert("MetaMask non détecté."); return; }
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                if (accounts[0].toLowerCase() === AUTH) {
                    document.getElementById('lockScreen').style.display = 'none';
                    document.getElementById('adminPanel').style.display = 'block';
                } else {
                    document.getElementById('status').innerText = "> ERREUR: WALLET NON AUTORISÉ";
                }
            } catch (e) { document.getElementById('status').innerText = "> ERREUR DE CONNEXION"; }
        }

        function save() {
            alert("Mise à jour de l'œuvre effectuée.");
        }
    </script>
</body>
</html>
