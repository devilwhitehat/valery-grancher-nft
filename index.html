<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valéry Grancher — Studio Admin</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #06060a; --accent: #beff09; --text: #ececf6; --sub: #585775; --panel: #100f17; --err: #fc3b54; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #lockScreen { text-align: center; }
        .brand { font-size: 26px; font-weight: 900; color: var(--accent); letter-spacing: 5px; margin-bottom: 5px; }
        .subtitle { color: var(--sub); font-size: 13px; letter-spacing: 2px; margin-bottom: 30px; }
        .btn-main { background: var(--accent); color: var(--bg); border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; font-size: 14px; text-transform: uppercase; transition: 0.3s; margin-top: 20px; }
        .btn-main:hover { opacity: 0.8; transform: scale(1.02); }
        #adminPanel { display: none; width: 100%; max-width: 500px; background: var(--panel); padding: 40px; border-radius: 4px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .form-group { margin-bottom: 20px; }
        label { display: block; color: var(--sub); font-size: 10px; text-transform: uppercase; margin-bottom: 8px; font-family: 'JetBrains Mono'; }
        input, textarea, select { width: 100%; background: #1a1923; border: 1px solid #2d2c39; color: white; padding: 12px; font-family: 'Inter'; border-radius: 4px; }
        h2 { font-weight: 200; border-bottom: 1px solid #2d2c39; padding-bottom: 15px; margin-bottom: 25px; }
    </style>
</head>
<body>
    <div id="lockScreen">
        <div class="brand">VALÉRY GRANCHER</div>
        <div class="subtitle">STUDIO ARTISTE</div>
        <button class="btn-main" onclick="connect()">Connecter MetaMask</button>
        <p id="status" style="font-size: 10px; color: var(--sub); margin-top: 15px;"></p>
    </div>

    <div id="adminPanel">
        <h2>ÉDITION_OEUVRE</h2>
        <div class="form-group"><label>Titre de l'œuvre</label><input type="text" id="title"></div>
        <div style="display:flex; gap:15px">
            <div class="form-group" style="flex:2"><label>Série / Collection</label><input type="text" id="series"></div>
            <div class="form-group" style="flex:1">
                <label>Édition (0-100)</label>
                <select id="edition"></select>
            </div>
        </div>
        <div class="form-group"><label>Prix (ETH)</label><input type="number" step="0.01" id="price"></div>
        <div class="form-group"><label>Description</label><textarea id="desc" rows="4"></textarea></div>
        <button class="btn-main" style="width:100%" onclick="alert('Données prêtes')">Enregistrer les modifications</button>
    </div>

    <script>
        const AUTHORIZED_WALLET = "0xa26698254830a4bceb381700cfb0b38a4f146f93".toLowerCase();
        
        const select = document.getElementById('edition');
        for(let i=0; i<=100; i++) {
            let opt = document.createElement('option');
            opt.value = i;
            opt.innerHTML = i === 0 ? "Unique (1/1)" : "Édition " + i;
            select.appendChild(opt);
        }

        async function connect() {
            const status = document.getElementById('status');
            if (!window.ethereum) { alert("MetaMask non détecté."); return; }
            try {
                const provider = new ethers.BrowserProvider(window.ethereum);
                const accounts = await provider.send("eth_requestAccounts", []);
                if (accounts[0].toLowerCase() === AUTHORIZED_WALLET) {
                    document.getElementById('lockScreen').style.display = 'none';
                    document.getElementById('adminPanel').style.display = 'block';
                } else {
                    status.innerText = "ERREUR : Wallet non autorisé.";
                }
            } catch (e) { status.innerText = "Erreur de connexion."; }
        }
    </script>
</body>
</html>
